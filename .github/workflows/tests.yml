name: Tests

# Run the test suites automatically on every push and pull request.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Run tests
        working-directory: backend
        run: npm test

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        # --legacy-peer-deps matches how the project installs locally
        # (react-leaflet's peer range lags the pinned React version).
        run: npm ci --legacy-peer-deps
      - name: Run tests
        working-directory: frontend
        run: npm test
